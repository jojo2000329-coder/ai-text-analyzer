<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 智文助手</title>
<style>
:root{--p:#2563eb;--bg:#f0f4f8;--c:#fff;--t:#1e293b;--t2:#64748b;--b:#e2e8f0;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;background:var(--bg);color:var(--t);height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--c);border-bottom:1px solid var(--b);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{font-size:11px;padding:2px 10px;border-radius:99px;background:#eef2ff;color:var(--p);font-weight:600}
.hdr .r{margin-left:auto;display:flex;gap:8px}
.hdr .r button{padding:6px 14px;border-radius:8px;border:1px solid var(--b);background:var(--c);cursor:pointer;font-size:12px;color:var(--t2)}
.hdr .r button:hover{background:#f1f5f9;color:var(--p)}
.main{display:flex;flex:1;overflow:hidden}
.sb{width:260px;background:var(--c);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0}
.sb-h{padding:16px;border-bottom:1px solid var(--b);font-size:13px;font-weight:600;color:var(--t2);display:flex;justify-content:space-between;align-items:center}
.sb-h button{padding:4px 10px;border-radius:6px;border:none;background:#eef2ff;color:var(--p);cursor:pointer;font-size:11px}
.sb-e{padding:32px 16px;text-align:center;color:var(--t2);font-size:13px;line-height:1.8}
.hl{flex:1;overflow-y:auto;padding:8px}
.hi{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:2px}
.hi:hover{background:#f8fafc}
.hi .ht{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hi .hts{font-size:11px;color:var(--t2);margin-top:2px}
.ct{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ch{flex:1;overflow-y:auto;padding:20px 24px;scroll-behavior:smooth}
.msg{margin-bottom:20px;max-width:780px;margin-left:auto;margin-right:auto;animation:fIn .35s}
@keyframes fIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg .av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.msg .mc{padding:14px 18px;border-radius:var(--r);font-size:14px;line-height:1.7;box-shadow:0 1px 2px rgba(0,0,0,0.04)}
.msg.u{display:flex;gap:10px;flex-direction:row-reverse}
.msg.u .mc{background:#eef2ff;border:1px solid #c7d2fe;color:#1e40af;border-bottom-right-radius:4px}
.msg.u .av{background:#dbeafe;color:#2563eb}
.msg.b{display:flex;gap:10px}
.msg.b .mc{background:var(--c);border:1px solid var(--b);border-bottom-left-radius:4px}
.msg.b .av{background:#f0f0ff;color:#7c3aed}
.rc{padding:12px;background:#f8fafc;border-radius:8px;margin-top:8px;font-size:13px}
.rc+.rc{margin-top:6px}
.rc .rl{font-weight:600;font-size:12px;color:var(--t2);margin-bottom:4px}
.in{padding:16px 24px 20px;background:var(--c);border-top:1px solid var(--b);flex-shrink:0}
.iw{max-width:780px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
.iw textarea{flex:1;padding:12px 16px;border:2px solid var(--b);border-radius:10px;font-size:14px;line-height:1.5;resize:none;outline:none;font-family:inherit;min-height:48px;max-height:120px}
.iw textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
.sb2{width:44px;height:44px;border-radius:10px;border:none;background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb2:hover{opacity:.9;transform:translateY(-1px)}
.sb2:disabled{opacity:.4;cursor:not-allowed}
.ld{display:flex;gap:4px;padding:8px 0}
.ld span{width:8px;height:8px;border-radius:50%;background:#94a3b8;animation:bn 1.4s infinite}
.ld span:nth-child(2){animation-delay:.2s}
.ld span:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@media(max-width:640px){.sb{display:none}}
</style>
</head>
<body>
<div class="hdr">
<h1>AI 智文助手</h1><span class="badge">v1.3</span>
<div class="r"><button onclick="if(confirm('确定清空？')){history=[];localStorage.removeItem('ah');renderH();resetChat();}">清空</button></div>
</div>
<div class="main">
<div class="sb">
<div class="sb-h">记录 <button onclick="resetChat()">+ 新建</button></div>
<div class="hl" id="hl"></div>
</div>
<div class="ct">
<div class="ch" id="ch"></div>
<div class="in">
<div class="iw">
<textarea id="tx" placeholder="输入文本，按 Enter 发送" rows="1"></textarea>
<button class="sb2" id="sbt">➤</button>
</div>
</div>
</div>
</div>
<script>
var E=['今天天气真好，阳光明媚，心情非常愉快！','这个产品太差了，用了两天就坏了，完全不推荐。','人工智能正在改变世界，机器学习在医疗、金融等领域广泛应用。','昨晚的足球比赛太精彩了，梅西梅开二度，带领球队逆转取胜。'];
var history=JSON.parse(localStorage.getItem('ah')||'[]');
var firstMsg=true;

function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function renderH(){var el=document.getElementById('hl');if(history.length===0){el.innerHTML='<div class="sb-e">暂无记录</div>';return}
var h='';for(var i=0;i<history.length;i++){h+='<div class="hi" onclick="loadH('+i+')"><div class="ht">'+history[i].t.substring(0,25)+(history[i].t.length>25?'...':'')+'</div><div class="hts">'+history[i].ts+'</div></div>';}
el.innerHTML=h;}
function addMsg(role,content){var ch=document.getElementById('ch');var d=document.createElement('div');d.className='msg '+(role==='user'?'u':'b');
var av=role==='user'?'👤':'🤖';var html='<div class="av">'+av+'</div><div class="mc">'+content+'</div>';d.innerHTML=html;ch.appendChild(d);ch.scrollTop=ch.scrollHeight;}
function bR(d){var s=d.sentiment||{};var kw=d.keywords||[];var si={p:{e:'😊',l:'正面',c:'#16a34a',b:'#f0fdf4'},n:{e:'😞',l:'负面',c:'#dc2626',b:'#fef2f2'},neu:{e:'😐',l:'中性',c:'#64748b',b:'#f8fafc'}};var x=si[s.label]||si.neu;var cat=d.category?d.category.category||'其他':'其他';var conf=d.category?d.category.confidence:0;
var kt=kw.length?kw.map(function(k){return k.word;}).join('、'):'（暂未提取到关键词）';
var sm=d.summary?d.summary.summary||'文本较短，无需摘要':'文本较短，无需摘要';
var sentimentLine=s.label==='positive'?'😊 **正面**（置信度 '+(s.score*100).toFixed(1)+'%）':s.label==='negative'?'😞 **负面**（置信度 '+(s.score*100).toFixed(1)+'%）':'😐 **中性**（置信度 '+(s.score*100).toFixed(1)+'%）';
var html='';
html+='<div style="margin-bottom:10px">好的，我分析完了！以下是结果：</div>';
html+='<div class="rc"><div class="rl">😊 情感倾向</div>'+sentimentLine+'</div>';
html+='<div class="rc"><div class="rl">🏷️ 关键词</div>'+esc(kt)+'</div>';
html+='<div class="rc"><div class="rl">📝 摘要</div>'+esc(sm)+'</div>';
html+='<div class="rc"><div class="rl">📂 分类</div>'+esc(cat)+(conf>0?'（匹配度 '+(conf*100).toFixed(0)+'%）':'')+'</div>';
return html;}
function addResult(d){var ch=document.getElementById('ch');var div=document.createElement('div');div.className='msg b';div.innerHTML='<div class="av">🤖</div><div class="mc">'+bR(d)+'</div>';ch.appendChild(div);ch.scrollTop=ch.scrollHeight;}
function saveH(text,result){var now=new Date();var ts=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');history.unshift({t:text,r:result,ts:ts});if(history.length>50)history=history.slice(0,50);localStorage.setItem('ah',JSON.stringify(history));renderH();}
function loadH(i){var h=history[i];document.getElementById('ch').innerHTML='';addMsg('user',esc(h.t));addResult(h.r);}
function resetChat(){document.getElementById('ch').innerHTML='';firstMsg=true;
var msg='你好！我是 AI 智文助手 👋\n\n请给我一段中文文本，我可以帮你分析：\n• 情感倾向（正面/负面/中性）\n• 提取关键词\n• 生成摘要\n• 自动分类\n\n试试下面这些示例👇';
var ch=document.getElementById('ch');var div=document.createElement('div');div.className='msg b';div.innerHTML='<div class="av">🤖</div><div class="mc" style="white-space:pre-wrap">'+esc(msg)+'</div>';ch.appendChild(div);
var exDiv=document.createElement('div');exDiv.className='msg';exDiv.style.cssText='display:flex;gap:8px;flex-wrap:wrap;margin-top:-10px;max-width:780px;margin-left:auto;margin-right:auto';
for(var i=0;i<E.length;i++){(function(idx){var btn=document.createElement('button');btn.textContent=E[idx].substring(0,10)+(E[idx].length>10?'...':'');btn.style.cssText='padding:6px 14px;border-radius:99px;border:1px solid var(--b);background:var(--c);cursor:pointer;font-size:12px;color:var(--t2);margin-bottom:20px';btn.onclick=function(){document.getElementById('tx').value=E[idx];a();};exDiv.appendChild(btn);})(i);}
ch.appendChild(exDiv);ch.scrollTop=ch.scrollHeight;document.getElementById('tx').focus();}
document.getElementById('tx').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();a();}});
document.getElementById('sbt').onclick=a;
async function a(){var t=document.getElementById('tx').value.trim();if(!t)return;var btn=document.getElementById('sbt');btn.disabled=true;addMsg('user',esc(t));
var ld=document.createElement('div');ld.className='msg b';ld.innerHTML='<div class="av">🤖</div><div class="mc"><div class="ld"><span></span><span></span><span></span></div></div>';document.getElementById('ch').appendChild(ld);document.getElementById('ch').scrollTop=document.getElementById('ch').scrollHeight;
try{var r=await fetch('/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t,lang:'zh'})});var d=await r.json();ld.remove();addResult(d);saveH(t,d);document.getElementById('tx').value='';}catch(e){ld.innerHTML='<div class="msg b"><div class="av">🤖</div><div class="mc" style="color:#dc2626">请求失败，请重试</div></div>';}
btn.disabled=false;document.getElementById('tx').focus();}
renderH();resetChat();
</script>
</body>
</html>
